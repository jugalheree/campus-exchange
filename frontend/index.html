<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary meta -->
    <title>Campus Exchange</title>
    <meta name="description" content="The student marketplace for your university" />
    <meta name="theme-color" content="#080808" />

    <!-- PWA / installability -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS PWA — makes it look native when added to home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CampusEx" />

    <!-- Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="CampusEx" />

    <!-- Prevent phone-number auto-linking -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph (for sharing links) -->
    <meta property="og:title" content="Campus Exchange" />
    <meta property="og:description" content="The student marketplace for your university" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
